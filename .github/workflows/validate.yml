name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Validate all SKILL.md files
        run: python3 scripts/validate.py
      
      - name: Check package script runs
        run: |
          chmod +x scripts/package.sh
          ./scripts/package.sh
          
          # Verify expected count
          count=$(ls dist/*.zip | wc -l)
          if [ "$count" != "28" ]; then
            echo "Expected 28 skill zips, found $count"
            exit 1
          fi
          echo "✓ All 28 skills packaged successfully"
      
      - name: Check install script syntax
        run: bash -n install.sh
